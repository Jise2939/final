<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>东坝人流变化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: "PingFang TC", "Noto Serif TC", serif;
    background: #fff;
    margin: 0;
    padding: 60px 20px;
  }

  .chart-container {
    max-width: 900px;
    margin: auto;
  }

  h2 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 10px;
  }

  .subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 30px;
  }

  .note {
    max-width: 700px;
    margin: 20px auto 0;
    font-size: 14px;
    color: #555;
    line-height: 1.7;
    text-align: center;
  }
</style>
</head>

<body>

<div class="chart-container">

  <h2>万宜水库东坝人流变化（周末及公众假期）</h2>
  <div class="subtitle">2025年1月 – 2026年2月</div>

  <canvas id="barChart"></canvas>

  <div class="note">
    夏季（6–9月）人流明显较低，而11月达到全年高峰（2400人次），显示人流压力具有显著季节性波动。
  </div>

</div>

<script>
const labels = [
'2025-01','02','03','04','05','06','07','08','09','10','11','12',
'2026-01','02'
];

const data = [1900,1500,1900,1100,1500,800,500,700,900,1500,2400,1700,1900,1800];

// 设置颜色：6-9月淡蓝，其余深蓝
const backgroundColors = data.map((v, i) => {
  // index对应月份（从0开始）
  const monthIndex = i;

  // 6月(5),7月(6),8月(7),9月(8)
  if (monthIndex >= 5 && monthIndex <= 8) {
    return 'rgba(100, 181, 246, 0.6)'; // 浅蓝
  } else {
    return 'rgba(25, 118, 210, 0.9)'; // 深蓝
  }
});

const ctx = document.getElementById('barChart').getContext('2d');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      data: data,
      backgroundColor: backgroundColors,
      borderRadius: 6
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: function(context) {
            return context.raw + " 人次";
          }
        }
      }
    },
    scales: {
      y: {
        beginAtZero: true,
        grid: {
          color: '#eee'
        }
      },
      x: {
        grid: {
          display: false
        }
      }
    },
    animation: {
      duration: 1200
    }
  }
});
</script>

</body>
</html>
